<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <nav>
    <span class="nav-brand">🎮 Game Tracker</span>
    <div class="nav-actions">
      <button class="btn btn-primary" onclick="openAddModal()">+ Add Game</button>
    </div>
  </nav>

  <main id="app"></main>

  <!-- ── Add / Edit Modal ── -->
  <div class="modal-backdrop" id="addModal">
    <div class="modal">
      <h2 id="modal-title">➕ Add a Game</h2>
      <div>
        <label>Section</label>
        <select id="input-section"></select>
      </div>
      <div>
        <label>Game Name</label>
        <input type="text" id="input-name" placeholder="e.g. Elden Ring" />
      </div>
      <div>
        <label>Cover Image URL</label>
        <input type="url" id="input-cover" placeholder="https://..." />
      </div>
      <div id="hours-field" style="display:none;">
        <label>Hours Played</label>
        <input type="number" id="input-hours" placeholder="e.g. 42" min="0" />
      </div>
      <span class="modal-error" id="modal-error">Please fill in all fields.</span>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeAddModal()">Cancel</button>
        <button class="btn btn-primary" id="modal-submit-btn" onclick="handleSubmitModal()">Add Game</button>
      </div>
    </div>
  </div>

  <!-- ── Detail Popup ── -->
  <div class="modal-backdrop" id="detailModal">
    <div class="modal detail-modal">
      <button class="detail-close" onclick="closeDetailModal()">✕</button>
      <div class="detail-cover-wrap">
        <img id="detail-cover" src="" alt="" />
      </div>
      <div class="detail-body">
        <div class="detail-header">
          <h2 id="detail-title"></h2>
          <span class="badge" id="detail-badge"></span>
        </div>
        <div class="detail-meta" id="detail-hours-row" style="display:none;">
          <span class="detail-meta-label">⏱ Hours Played</span>
          <span class="detail-meta-value" id="detail-hours"></span>
        </div>
        <div class="detail-actions">
          <button class="btn btn-primary" id="detail-edit-btn">✏️ Edit</button>
          <button class="btn btn-danger" id="detail-delete-btn">🗑 Delete</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Toast ── -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
