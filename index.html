<head>
  <meta charset="UTF-8" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0d0d0d;
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -120px;
      left: -120px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.25) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13, 13, 13, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(124, 58, 237, 0.2);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
    }

    .nav-brand {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(90deg, #7c3aed, #a78bfa, #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    main {
      position: relative;
      z-index: 1;
      padding: 40px 32px 60px;
      display: flex;
      flex-direction: column;
      gap: 52px;
    }

    .section-heading {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      padding-left: 16px;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .section-count {
      font-size: 0.8rem;
      font-weight: 500;
      color: #888;
      background: rgba(255, 255, 255, 0.07);
      padding: 2px 10px;
      border-radius: 999px;
    }

    .card-row {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      padding: 12px;
    }

    .card {
      flex: 0 0 180px;
      width: 180px;
      height: 280px;
      background: #1a1a1a;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 0 1px rgba(124, 58, 237, 0.5), 0 8px 32px rgba(124, 58, 237, 0.45), 0 2px 8px rgba(0, 0, 0, 0.6);
    }

    .card-cover {
      width: 100%;
      height: 220px;
      display: block;
      flex-shrink: 0;
    }

    .card-footer {
      flex: 1;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
      background: #1a1a1a;
    }

    .card-title {
      font-size: 0.78rem;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
      letter-spacing: 0.3px;
      width: fit-content;
    }
  </style>
</head>

    const THEMES = {
      played: { color: "#22c55e", badgeText: "✓ Played", bgAlpha: "rgba(34,197,94,0.18)", border: "rgba(34,197,94,0.35)" },
      wishlist: { color: "#eab308", badgeText: "★ Wishlist", bgAlpha: "rgba(234,179,8,0.18)", border: "rgba(234,179,8,0.35)" },
      bought: { color: "#3b82f6", badgeText: "🛒 Bought", bgAlpha: "rgba(59,130,246,0.18)", border: "rgba(59,130,246,0.35)" },
      wishlistunreleased: { color: "#45a386", badgeText: "★ Wishlist", bgAlpha: "rgba(234,179,8,0.18)", border: "rgba(234,179,8,0.35)"}
    };
    const FALLBACK_THEME = { color: "#7c3aed", badgeText: "🎮 Other", bgAlpha: "rgba(124,58,237,0.18)", border: "rgba(124,58,237,0.35)" };

    function getTheme(section) {
      return THEMES[section.theme] || { ...FALLBACK_THEME, badgeText: section.label };
    }

    function buildCard(game, t) {
      const card = document.createElement('div');
      card.className = 'card';

      const img = document.createElement('img');
      img.className = 'card-cover';
      img.src = game.cover;
      img.alt = game.name;
      img.loading = 'lazy';

      const footer = document.createElement('div');
      footer.className = 'card-footer';

      const title = document.createElement('div');
      title.className = 'card-title';
      title.title = game.name;
      title.textContent = game.name;


      footer.appendChild(title);
      card.appendChild(img);
      card.appendChild(footer);
      return card;
    }

    function buildSection(key, section) {
      const t = getTheme(section);

      const wrapper = document.createElement('section');

      const heading = document.createElement('div');
      heading.className = 'section-heading';
      heading.style.borderLeft = '4px solid ' + t.color;

      const iconSpan = document.createElement('span');
      iconSpan.textContent = section.icon;

      const labelSpan = document.createElement('span');
      labelSpan.textContent = section.label;

      const count = document.createElement('span');
      count.className = 'section-count';
      count.textContent = section.games.length + ' game' + (section.games.length !== 1 ? 's' : '');

      heading.appendChild(iconSpan);
      heading.appendChild(labelSpan);
      heading.appendChild(count);

      const row = document.createElement('div');
      row.className = 'card-row';

      section.games.forEach(game => {
        row.appendChild(buildCard(game, t));
      });

      wrapper.appendChild(heading);
      wrapper.appendChild(row);
      return wrapper;
    }

    (function render() {
      const app = document.getElementById('app');
      Object.entries(GAMES).forEach(([key, section]) => {
        app.appendChild(buildSection(key, section));
      });
    })();
