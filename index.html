<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <nav>
    <span class="nav-brand">🎮 Game Tracker</span>
    <div class="nav-actions">
      <button class="btn btn-primary" onclick="openAddModal()">+ Add Game</button>
    </div>
  </nav>

  <main id="app"></main>

  <!-- Add Game Modal -->
  <div class="modal-backdrop" id="addModal">
    <div class="modal">
      <h2>➕ Add a Game</h2>
      <div>
        <label>Section</label>
        <select id="input-section"></select>
      </div>
      <div>
        <label>Game Name</label>
        <input type="text" id="input-name" placeholder="e.g. Elden Ring" />
      </div>
      <div>
        <label>Cover Image URL</label>
        <input type="url" id="input-cover" placeholder="https://..." />
      </div>
      <span class="modal-error" id="modal-error">Please fill in all fields.</span>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeAddModal()">Cancel</button>
        <button class="btn btn-primary" onclick="handleAddGame()">Add Game</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
